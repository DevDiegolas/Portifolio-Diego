<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Pixel art arrow cursor — Stardew Valley style -->
  <!-- Colors:
       #1a0d05 = dark brown outline
       #f0ddb5 = warm cream fill
       #fff8e8 = bright highlight (top-left inner edge)
       #c9a96e = shadow (bottom-right inner edge)
  -->

  <!-- Row 0 (y=0) -->
  <rect x="0" y="0" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 1 (y=2) -->
  <rect x="0" y="2" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="2" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 2 (y=4) -->
  <rect x="0" y="4" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="4" width="2" height="2" fill="#fff8e8"/>
  <rect x="4" y="4" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 3 (y=6) -->
  <rect x="0" y="6" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="6" width="2" height="2" fill="#fff8e8"/>
  <rect x="4" y="6" width="2" height="2" fill="#f0ddb5"/>
  <rect x="6" y="6" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 4 (y=8) -->
  <rect x="0" y="8" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="8" width="2" height="2" fill="#fff8e8"/>
  <rect x="4" y="8" width="2" height="2" fill="#f0ddb5"/>
  <rect x="6" y="8" width="2" height="2" fill="#f0ddb5"/>
  <rect x="8" y="8" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 5 (y=10) -->
  <rect x="0" y="10" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="10" width="2" height="2" fill="#fff8e8"/>
  <rect x="4" y="10" width="2" height="2" fill="#f0ddb5"/>
  <rect x="6" y="10" width="2" height="2" fill="#f0ddb5"/>
  <rect x="8" y="10" width="2" height="2" fill="#f0ddb5"/>
  <rect x="10" y="10" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 6 (y=12) -->
  <rect x="0" y="12" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="12" width="2" height="2" fill="#fff8e8"/>
  <rect x="4" y="12" width="2" height="2" fill="#f0ddb5"/>
  <rect x="6" y="12" width="2" height="2" fill="#f0ddb5"/>
  <rect x="8" y="12" width="2" height="2" fill="#f0ddb5"/>
  <rect x="10" y="12" width="2" height="2" fill="#f0ddb5"/>
  <rect x="12" y="12" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 7 (y=14) -->
  <rect x="0" y="14" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="14" width="2" height="2" fill="#fff8e8"/>
  <rect x="4" y="14" width="2" height="2" fill="#f0ddb5"/>
  <rect x="6" y="14" width="2" height="2" fill="#f0ddb5"/>
  <rect x="8" y="14" width="2" height="2" fill="#f0ddb5"/>
  <rect x="10" y="14" width="2" height="2" fill="#f0ddb5"/>
  <rect x="12" y="14" width="2" height="2" fill="#c9a96e"/>
  <rect x="14" y="14" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 8 (y=16) — right-angle turn -->
  <rect x="0" y="16" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="16" width="2" height="2" fill="#fff8e8"/>
  <rect x="4" y="16" width="2" height="2" fill="#f0ddb5"/>
  <rect x="6" y="16" width="2" height="2" fill="#f0ddb5"/>
  <rect x="8" y="16" width="2" height="2" fill="#c9a96e"/>
  <rect x="10" y="16" width="2" height="2" fill="#1a0d05"/>
  <rect x="12" y="16" width="2" height="2" fill="#1a0d05"/>
  <rect x="14" y="16" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 9 (y=18) -->
  <rect x="0" y="18" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="18" width="2" height="2" fill="#fff8e8"/>
  <rect x="4" y="18" width="2" height="2" fill="#f0ddb5"/>
  <rect x="6" y="18" width="2" height="2" fill="#c9a96e"/>
  <rect x="8" y="18" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 10 (y=20) -->
  <rect x="0" y="20" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="20" width="2" height="2" fill="#f0ddb5"/>
  <rect x="4" y="20" width="2" height="2" fill="#c9a96e"/>
  <rect x="6" y="20" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 11 (y=22) -->
  <rect x="0" y="22" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="22" width="2" height="2" fill="#c9a96e"/>
  <rect x="4" y="22" width="2" height="2" fill="#1a0d05"/>

  <!-- Row 12 (y=24) -->
  <rect x="0" y="24" width="2" height="2" fill="#1a0d05"/>
  <rect x="2" y="24" width="2" height="2" fill="#1a0d05"/>
</svg>
